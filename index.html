<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SEO Crawler Demo</title>

<style>
  body {
    font-family: Arial;
    background: #0e1113;
    color: white;
    padding: 20px;
  }
  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
  }
  button {
    background: hotpink;
    color: black;
    font-weight: bold;
  }
  .box {
    margin-top: 20px;
    padding: 15px;
    background: #1a1d21;
    border-radius: 12px;
    white-space: pre-wrap;
  }
</style>
</head>

<body>

<h2>SEO Crawler (Mobile Demo)</h2>

<input id="url" placeholder="Enter URL (https://...)" />
<button onclick="crawl()">Run Crawl</button>

<div id="output" class="box">Results will appear here...</div>

<script>
async function crawl() {
  const url = document.getElementById("url").value;
  const output = document.getElementById("output");

  output.innerText = "Fetching...";

  try {
    // NOTE: direct fetch often fails due to CORS
    const res = await fetch(url);
    const html = await res.text();

    // extract SEO basics
    const title = html.match(/<title>(.*?)<\/title>/i)?.[1] || "No title";
    const metaDesc = html.match(/name="description" content="(.*?)"/i)?.[1] || "No description";
    const h1 = html.match(/<h1.*?>(.*?)<\/h1>/i)?.[1] || "No H1";

    output.innerText =
      "TITLE:\n" + title +
      "\n\nDESCRIPTION:\n" + metaDesc +
      "\n\nH1:\n" + h1 +
      "\n\nRAW HTML LENGTH:\n" + html.length;

  } catch (err) {
    output.innerText =
      "❌ Fetch failed (CORS blocked)\n\n" +
      "Solution:\n" +
      "Use a proxy like:\n" +
      "https://api.allorigins.win/raw?url=" + url;
  }
}
</script>

</body>
</html>
