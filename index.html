<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новини от България</title>
    <style>
        :root {
            --primary: #00356b;
            --accent: #0f9ed2;
            --light: #f4f4f4;
            --dark: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 20px auto;
        }

        .news-item {
            background: white;
            margin: 10px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .news-item h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .news-item p {
            font-size: 14px;
            color: var(--dark);
        }

        .news-item a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .news-item a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: var(--primary);
            padding: 20px;
        }

        footer {
            margin-top: 20px;
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Новини от България</h1>
    <p>Последни новини от водещи източници</p>
</header>

<main class="container">
    <div class="loading">Зареждане на новини...</div>
    <div id="news"></div>
</main>

<footer>
    <p>&copy; 2026 Българските Новини. Всички права запазени.</p>
</footer>

<script>
    // RSS Feed URLs от български източници
    const rssFeeds = [
        "https://www.dnevnik.bg/rssc/?rubrid=1656",
        "https://www.capital.bg/rss/",
        "https://nova.bg/rss/latest"
    ];

    const newsContainer = document.getElementById("news");

    async function fetchRSS() {
        try {
            // Зареждане на всеки RSS feed
            const results = await Promise.all(
                rssFeeds.map(feed => 
                    fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feed)}`)
                        .then(res => res.json())
                        .then(data => new window.DOMParser().parseFromString(data.contents, "text/xml"))
                )
            );

            // Обработка на новините от резултатите
            const articles = [];
            results.forEach(rss => {
                const items = rss.querySelectorAll("item");
                items.forEach(item => {
                    articles.push({
                        title: item.querySelector("title")?.textContent,
                        link: item.querySelector("link")?.textContent,
                        description: item.querySelector("description")?.textContent
                    });
                });
            });

            // Селектиране на топ 10 новини
            const topArticles = articles.slice(0, 10);

            // Изграждане на HTML за всяка новина
            newsContainer.innerHTML = topArticles.map(article => `
                <div class="news-item">
                    <h2>${article.title}</h2>
                    <p>${article.description || "Описание не е налично."}</p>
                    <a href="${article.link}" target="_blank">Прочетете повече</a>
                </div>
            `).join("");

        } catch (error) {
            console.error("Грешка при зареждане на RSS:", error);
            newsContainer.innerHTML = `<p>Не успяхме да заредим новините. Моля, опитайте по-късно.</p>`;
        }
    }

    // Извикване на функцията за зареждане на RSS feed
    fetchRSS();
</script>

</body>
</html>
