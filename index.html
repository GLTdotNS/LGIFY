<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>LGIFY - Professional Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f3f4f6, #e2e8f0);
        }
        header {
            background-color: #4a90e2;
            padding: 20px;
            text-align: center;
            color: white;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin: 0 5px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover {
            background-color: #357ab7;
        }
        .hero {
            background-image: url('hero.jpg');
            height: 400px;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        @media (max-width: 600px) {
            .hero {
                height: 300px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to LGIFY</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#about">About Us</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <section class="hero">
        <h2>Your modern business solution</h2>
    </section>
    <footer>
        <p>&copy; 2026 LGIFY. All rights reserved.</p>
    </footer>
</body>
</html>
