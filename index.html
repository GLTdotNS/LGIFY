<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator</title>
    <style>
        :root {
            --primary: #0072C6;
            --secondary: #00b4d8;
            --light: #f9f9f9;
            --dark: #222;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
        }

        p.subtitle {
            margin-top: 0;
            font-size: 14px;
            color: #ddd;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
        }

        .news-item {
            background: white;
            padding: 15px;
            border-radius: var(--radius);
            margin: 15px 0;
            border: 1px solid #ddd;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.1);
        }

        .news-item h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .news-item p {
            font-size: 14px;
            color: #555;
        }

        .news-item a {
            display: inline-block;
            margin-top: 10px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: bold;
        }

        .news-item a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            background: var(--dark);
            color: white;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>News Aggregator</h1>
    <p class="subtitle">Bringing you the latest news from trusted sources</p>
</header>

<main class="container">
    <!-- Loading message -->
    <p id="loading" style="text-align:center; color: var(--primary);">Loading news...</p>
    <!-- News items container -->
    <div id="news-container"></div>
</main>

<footer>
    <p>&copy; 2026 News Aggregator. Powered by RSS Feeds.</p>
</footer>

<script>
    // RSS Feed Sources
    const rssFeeds = [
        "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml", // NY Times
        "http://feeds.bbci.co.uk/news/world/rss.xml", // BBC World
        "http://rss.cnn.com/rss/edition.rss" // CNN
    ];

    const newsContainer = document.getElementById("news-container");
    const loadingMessage = document.getElementById("loading");

    // Fetch RSS feeds
    async function fetchRSSFeeds() {
        try {
            // Fetch all feeds and parse them
            const feeds = await Promise.all(
                rssFeeds.map(feed =>
                    fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feed)}`)
                        .then(response => response.json())
                        .then(data => new DOMParser().parseFromString(data.contents, "application/xml"))
                )
            );

            // Collect articles from all parsed feeds
            const articles = [];
            feeds.forEach(feed => {
                const items = feed.querySelectorAll("item");
                items.forEach(item => {
                    articles.push({
                        title: item.querySelector("title").textContent,
                        link: item.querySelector("link").textContent,
                        description: item.querySelector("description") ? item.querySelector("description").textContent : "No description available."
                    });
                });
            });

            // Sort articles by publication date or relevance (additional logic can be added)
            // Render the top 10 articles
            renderNews(articles.slice(0, 10));
        } catch (error) {
            console.error("Failed to fetch RSS feeds:", error);
            newsContainer.innerHTML = "<p>Error loading news. Please try again later.</p>";
        }
    }

    // Render news list
    function renderNews(articles) {
        loadingMessage.style.display = "none";
        newsContainer.innerHTML = articles.map(article => `
            <div class="news-item">
                <h2>${article.title}</h2>
                <p>${article.description}</p>
                <a href="${article.link}" target="_blank">Read full article</a>
            </div>
        `).join('');
    }

    // Fetch news on page load
    fetchRSSFeeds();
</script>

</body>
</html>
