<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f4f6f9;
}

/* Layout */

.dashboard {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: 100vh;
}

/* Sidebar */

.sidebar {
    background: #111827;
    color: white;
    padding: 30px 20px;
}

.sidebar h2 {
    margin-bottom: 40px;
}

.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar li {
    margin: 20px 0;
    cursor: pointer;
    opacity: 0.8;
}

.sidebar li:hover {
    opacity: 1;
}

/* Main */

.main {
    padding: 30px;
}

/* Cards */

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.card h3 {
    margin: 0;
    font-size: 14px;
    color: #6b7280;
}

.card p {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

/* Profit */

.profit {
    color: #10b981;
}

/* Withdraw Button */

.withdraw {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #10b981;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.withdraw:hover {
    background: #059669;
}

/* Chart */

.chart-box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

</style>
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>💼 Dashboard</h2>

<ul>
<li>📊 Overview</li>
<li>💰 Earnings</li>
<li>📁 Reports</li>
<li>⚙️ Settings</li>
</ul>

</div>

<!-- Main -->

<div class="main">

<!-- Stats -->

<div class="cards">

<div class="card">
<h3>Total Profit</h3>
<p class="profit">€25,000</p>

<button class="withdraw" onclick="withdrawMoney()">
💳 Withdraw
</button>

</div>

<div class="card">
<h3>Users</h3>
<p>1,245</p>
</div>

<div class="card">
<h3>Orders</h3>
<p>534</p>
</div>

<div class="card">
<h3>Conversion</h3>
<p>7.8%</p>
</div>

</div>

<!-- Chart -->

<div class="chart-box">

<canvas id="profitChart"></canvas>

</div>

</div>

</div>

<script>

/* Withdraw Button */

function withdrawMoney() {

alert("Withdrawal request sent successfully!");

}

/* Chart.js */

const ctx = document.getElementById('profitChart');

new Chart(ctx, {
    type: 'line',

    data: {

        labels: [
            'Jan',
            'Feb',
            'Mar',
            'Apr',
            'May',
            'Jun',
            'Jul',
            'Aug',
            'Sep',
            'Oct',
            'Nov',
            'Dec'
        ],

        datasets: [{

            label: 'Monthly Profit (€)',

            data: [
                2000,
                2500,
                3000,
                2800,
                3500,
                4200,
                3900,
                4600,
                5200,
                6100,
                7000,
                8200
            ],

            borderWidth: 3,
            tension: 0.4

        }]
    },

    options: {

        responsive: true,

        plugins: {
            legend: {
                display: true
            }
        }

    }

});

</script>

</body>
</html>
